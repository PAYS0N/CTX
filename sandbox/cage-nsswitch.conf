# Bound as /etc/nsswitch.conf in --claude mode. The host's line pulls
# systemd-only NSS plugins (mymachines, mdns) whose runtime sockets are
# absent in the cage; this is the deterministic minimum for resolving
# api.anthropic.com over the shared (1a) network.
passwd:     files
group:      files
shadow:     files
hosts:      files dns
networks:   files
protocols:  files
services:   files
