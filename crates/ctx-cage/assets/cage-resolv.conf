# Bound read-only as /etc/resolv.conf in every cage (ADR-049).
#
# The cage is unconditionally offline (--unshare-net) and its only
# egress is the host-side API proxy, reached over a UNIX socket at an
# IP literal. DNS is therefore never expected to succeed. This file
# exists to make it fail *slowly*.
#
# With no resolv.conf at all (the cage mounts almost none of /etc), or
# with an empty one, the resolver falls back to its 127.0.0.1:53
# default. The cage's netns has loopback up and nothing listening on
# :53, so every query is refused instantly and retried immediately —
# a tight loop that burns a full core for the whole session.
#
# 192.0.2.1 is TEST-NET-1 (RFC 5737): guaranteed unroutable, and
# unreachable from the cage's empty netns, so queries fail without the
# instant refusal that drives the retry loop. The address is never
# reached and nothing resolves through it. Any non-loopback address
# works; a loopback one reintroduces the spin.
nameserver 192.0.2.1
